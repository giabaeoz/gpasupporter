<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Môn lẻ | Credit & GPA Strategist</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- =================== AUTH SCREEN (Chỉ để tương thích JS, ẩn đi) ==================== -->
  <section id="auth-screen" style="display: none;"></section>

  <!-- =================== MAIN APP ======================== -->
  <section id="main-app" class="main-app">

    <header class="navbar-pill">
      <div class="nav-left">
        <strong>CG Strategist</strong>
      </div>
      <div class="nav-center hidden-mobile">
        <a href="index.html" class="nav-tab">Nhập điểm</a>
        <a href="roadmap.html" class="nav-tab">Lộ trình</a>
        <a href="subjects.html" class="nav-tab active">Môn lẻ</a>
      </div>
      <div class="nav-right flex-center">
        <span id="user-email-display" class="user-email hidden-mobile"></span>
        <button id="btn-logout" class="btn-avatar" title="Đăng xuất">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </header>

    <main class="soft-grid">
      <!-- CỘT TRÁI (TỔNG KẾT) -->
      <div class="col-left">
        <div class="soft-card h-100">
          <h2 class="card-title">
            <svg class="icon-inline" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
            Tổng kết
          </h2>
          <div class="stats-row">
            <div class="stat-box">
              <span class="stat-label">GPA HIỆN TẠI</span>
              <strong class="stat-value" id="gpa-value">0.00</strong>
            </div>
            <div class="stat-box">
              <span class="stat-label">TÍCH LŨY</span>
              <strong class="stat-value"><span id="credits-current">0</span>/<span id="credits-total">150</span></strong>
            </div>
          </div>
          
          <div class="stats-split">
            <div class="stat-box-split">
              <span class="stat-label">TÍN CHỈ</span>
              <strong class="stat-value-md" id="sim-credits-projected">0</strong>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-box-split">
              <span class="stat-label">XẾP LOẠI</span>
              <strong class="stat-value-md" id="rank-value">—</strong>
            </div>
          </div>
          
          <button class="btn-outline w-100" onclick="window.location.href='index.html'">Đồng bộ thêm dữ liệu</button>
        </div>
      </div>

      <!-- CỘT PHẢI (BẢNG LỊCH SỬ MÔN HỌC) -->
      <div class="col-right">
        
        <div class="soft-card w-100 h-100">
          <h2 class="card-title mb-20">📚 Lịch sử Môn học</h2>
          <div class="table-wrapper">
            <table class="soft-table">
              <thead>
                <tr>
                  <th>STT</th>
                  <th>Mã môn</th>
                  <th>Tên môn</th>
                  <th>TC</th>
                  <th>Hệ 10</th>
                  <th>Hệ 4</th>
                  <th>Xếp loại</th>
                </tr>
              </thead>
              <tbody id="course-tbody">
                <!-- JS Render -->
              </tbody>
            </table>
            <div id="table-empty" class="text-center text-muted mt-20" style="display:none;">Chưa có dữ liệu lịch sử môn học.</div>
          </div>
        </div>

      </div>
    </main>
  </section>

  <!-- Dummy tags to prevent JS errors -->
  <div style="display:none;">
    <form id="auth-form"></form><input id="auth-email"><input id="auth-password"><div id="auth-message"></div><button id="btn-login"></button><button id="btn-register"></button>
    <textarea id="input-transcript"></textarea><button id="btn-parse-save"></button><div id="parse-message"></div>
    <form id="sim-form"></form><ul id="sim-list"></ul><div id="sim-count"></div><div id="sim-gpa-projected"></div>
    <div id="grade-distribution"></div>
  </div>

  <script type="module" src="../js/app.js"></script>
</body>
</html>
